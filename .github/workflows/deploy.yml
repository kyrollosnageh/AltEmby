name: Deploy to Play Store

on:
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store track'
        required: true
        type: choice
        default: internal
        options:
          - internal
          - production

permissions:
  contents: read

env:
  FLUTTER_VERSION: stable

jobs:
  deploy-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: android

      - run: flutter pub get

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<PROPS
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          PROPS

      - name: Decode Play Store service account key
        run: echo "${{ secrets.PLAY_STORE_JSON_KEY_BASE64 }}" | base64 -d > android/play-store-key.json

      - name: Deploy to Play Store
        working-directory: android
        env:
          PLAY_STORE_JSON_KEY: play-store-key.json
        run: |
          if [ "${{ inputs.track }}" = "production" ]; then
            bundle exec fastlane promote_to_production
          else
            bundle exec fastlane deploy_internal
          fi
