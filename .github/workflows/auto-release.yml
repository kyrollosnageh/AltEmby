name: Auto Release

# Runs on every push to master — analyzes commits, bumps version, tags, triggers release
on:
  push:
    branches: [master, main]
    # Don't trigger on tag pushes or version bump commits (prevents infinite loop)
    tags-ignore:
      - 'v*'

permissions:
  contents: write
  actions: write

jobs:
  version-and-tag:
    runs-on: ubuntu-latest
    # Skip if the commit was made by this workflow (prevents loop)
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, 'chore(release):')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed to find last tag and analyze commits
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get last version tag
        id: last_tag
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 --match "v*" 2>/dev/null || echo "v0.0.0")
          echo "tag=$LAST_TAG" >> "$GITHUB_OUTPUT"
          echo "Last tag: $LAST_TAG"

      - name: Determine version bump from commits
        id: bump
        run: |
          LAST_TAG="${{ steps.last_tag.outputs.tag }}"
          echo "Analyzing commits since $LAST_TAG..."

          # Get all commit messages since last tag
          if [ "$LAST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --pretty=format:"%s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"%s" "${LAST_TAG}..HEAD")
          fi

          if [ -z "$COMMITS" ]; then
            echo "No new commits since $LAST_TAG"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Commits:"
          echo "$COMMITS"

          # Determine bump type
          BUMP="patch"

          # Check for breaking changes → major
          if echo "$COMMITS" | grep -qiE "^(feat|fix|refactor|perf)(\(.+\))?!:|BREAKING CHANGE"; then
            BUMP="major"
          # Check for new features → minor
          elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
            BUMP="minor"
          fi

          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Bump type: $BUMP"

      - name: Calculate new version
        if: steps.bump.outputs.skip != 'true'
        id: version
        run: |
          LAST_TAG="${{ steps.last_tag.outputs.tag }}"
          BUMP="${{ steps.bump.outputs.bump }}"

          # Strip 'v' prefix and split
          VERSION="${LAST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          # Handle missing parts
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}

          case "$BUMP" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "New version: $NEW_VERSION (was ${LAST_TAG})"

      - name: Update pubspec.yaml version
        if: steps.bump.outputs.skip != 'true'
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"

          # Calculate build number (total commit count)
          BUILD_NUMBER=$(git rev-list --count HEAD)

          # Update version line in pubspec.yaml
          sed -i "s/^version: .*/version: ${NEW_VERSION}+${BUILD_NUMBER}/" pubspec.yaml

          echo "Updated pubspec.yaml to version: ${NEW_VERSION}+${BUILD_NUMBER}"
          grep "^version:" pubspec.yaml

      - name: Commit version bump and create tag
        if: steps.bump.outputs.skip != 'true'
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          TAG="v${NEW_VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add pubspec.yaml
          git commit -m "chore(release): bump version to ${NEW_VERSION} [skip ci]"

          # Delete stale tag if it exists from a previous failed run
          git tag -d "$TAG" 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

          git tag -a "$TAG" -m "Release ${TAG}"
          git push origin HEAD
          git push origin "$TAG"

          echo "Created and pushed tag: $TAG"

      # GITHUB_TOKEN-created tags don't trigger other workflows,
      # so we dispatch the release workflow directly
      - name: Trigger release workflow
        if: steps.bump.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.new_version }}"
          gh workflow run release.yml -f tag="$TAG"
          echo "Dispatched release workflow for $TAG"
