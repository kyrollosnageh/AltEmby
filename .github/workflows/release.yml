name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FLUTTER_VERSION: stable

jobs:
  # ───────────────────────────── Quality gate ─────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  # ───────────────────────── Android builds ───────────────────────────────
  build-android:
    needs: test
    runs-on: ubuntu-latest
    env:
      HAS_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
      - run: flutter pub get

      # Decode signing keystore from secrets (if configured)
      - name: Decode keystore
        if: env.HAS_KEYSTORE == 'true'
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks

      - name: Create key.properties
        if: env.HAS_KEYSTORE == 'true'
        run: |
          cat > android/key.properties <<PROPS
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          PROPS

      # Build release APK
      - name: Build release APK
        run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      # Build release AAB (Play Store)
      - name: Build release AAB
        run: flutter build appbundle --release
      - uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: build/app/outputs/bundle/release/app-release.aab

  # ───────────────────────── iOS build ────────────────────────────────────
  build-ios:
    needs: test
    runs-on: macos-latest
    env:
      HAS_IOS_CERT: ${{ secrets.IOS_P12_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
      - run: flutter pub get

      # Import Apple signing certificate (if configured)
      - name: Install Apple certificate and provisioning profile
        if: env.HAS_IOS_CERT == 'true'
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 12)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo "${{ secrets.IOS_P12_BASE64 }}" | base64 -d > "$CERT_PATH"
          security import "$CERT_PATH" -P "${{ secrets.IOS_P12_PASSWORD }}" -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

          PROVISION_BASE64="${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}"
          if [ -n "$PROVISION_BASE64" ]; then
            PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
            echo "$PROVISION_BASE64" | base64 -d > "$PROFILE_PATH"
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" \
              /dev/stdin <<< "$(security cms -D -i "$PROFILE_PATH")")
            cp "$PROFILE_PATH" \
              ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID".mobileprovision
          fi

      # Build unsigned IPA (always works, no certs needed)
      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r AltEmby.ipa Payload
          rm -rf Payload

      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: AltEmby.ipa

  # ───────────────────────── GitHub Release ───────────────────────────────
  create-release:
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: release-aab
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: ios-ipa
          path: artifacts/

      - name: Rename artifacts
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          cd artifacts
          [ -f app-release.apk ] && mv app-release.apk "AltEmby-${TAG}.apk"
          [ -f app-release.aab ] && mv app-release.aab "AltEmby-${TAG}.aab"
          [ -f AltEmby.ipa ]    && mv AltEmby.ipa      "AltEmby-${TAG}.ipa"
          ls -la

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          gh release create "$TAG" \
            --title "AltEmby $TAG" \
            --generate-notes \
            artifacts/*
