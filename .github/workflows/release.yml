name: Release

# Triggered when a version tag is pushed: v1.0.0, v1.2.3, etc.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FLUTTER_VERSION: stable

jobs:
  # ───────────────────────────── Quality gate ─────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  # ───────────────────────── Android builds ───────────────────────────────
  build-android:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
      - run: flutter pub get

      # ── Decode signing keystore from secrets ──
      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks

      - name: Create key.properties
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          cat > android/key.properties <<PROPS
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          PROPS

      # ── Build release APK ──
      - name: Build release APK
        run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      # ── Build release AAB (Play Store) ──
      - name: Build release AAB
        run: flutter build appbundle --release
      - uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: build/app/outputs/bundle/release/app-release.aab

  # ───────────────────────── iOS build ────────────────────────────────────
  build-ios:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
      - run: flutter pub get

      # ── Import signing certificate + provisioning profile ──
      - name: Install Apple certificate and provisioning profile
        if: env.P12_BASE64 != ''
        env:
          P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          PROVISION_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 12)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo "$P12_BASE64" | base64 -d > "$CERT_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

          # Install provisioning profile
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "$PROVISION_BASE64" | base64 -d > "$PROFILE_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" \
            /dev/stdin <<< "$(security cms -D -i "$PROFILE_PATH")")
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID".mobileprovision

      # ── Build iOS ──
      - name: Build iOS (signed or unsigned)
        run: |
          if [ -n "${{ secrets.IOS_P12_BASE64 }}" ]; then
            flutter build ipa --release --export-options-plist=ios/ExportOptions.plist
          else
            flutter build ios --release --no-codesign
          fi

      - name: Package unsigned IPA (fallback)
        if: ${{ secrets.IOS_P12_BASE64 == '' }}
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r AltEmby.ipa Payload
          rm -rf Payload

      - name: Collect IPA
        run: |
          if [ -f build/ios/ipa/*.ipa ]; then
            cp build/ios/ipa/*.ipa AltEmby.ipa
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: AltEmby.ipa

  # ───────────────────────── GitHub Release ───────────────────────────────
  release:
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Download all build artifacts
      - uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: release-aab
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: ios-ipa
          path: artifacts/

      # Rename artifacts with version
      - name: Rename artifacts
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          cd artifacts
          [ -f app-release.apk ] && mv app-release.apk "AltEmby-${TAG}.apk"
          [ -f app-release.aab ] && mv app-release.aab "AltEmby-${TAG}.aab"
          [ -f AltEmby.ipa ]    && mv AltEmby.ipa      "AltEmby-${TAG}.ipa"
          ls -la

      # Create GitHub Release with all assets
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          gh release create "$TAG" \
            --title "AltEmby $TAG" \
            --generate-notes \
            artifacts/*
