name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.1.6)'
        required: true

permissions:
  contents: write

env:
  FLUTTER_VERSION: stable
  # Resolve tag from either trigger type
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  # Run test + Android build in ONE job to avoid re-downloading everything
  test-and-build-android:
    runs-on: ubuntu-latest
    env:
      HAS_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: android

      - uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/app/build.gradle.kts', 'android/build.gradle.kts') }}
          restore-keys: gradle-

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

      # Signing setup
      - name: Decode keystore
        if: env.HAS_KEYSTORE == 'true'
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks

      - name: Create key.properties
        if: env.HAS_KEYSTORE == 'true'
        run: |
          cat > android/key.properties <<PROPS
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          PROPS

      - name: Build release APK with Fastlane
        working-directory: android
        run: bundle exec fastlane release_apk

      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  # iOS runs in parallel with Android (no dependency)
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: ios

      - uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-macos-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-macos-

      - run: flutter pub get

      - name: Build iOS with Fastlane
        working-directory: ios
        run: bundle exec fastlane build_no_sign

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r AltEmby.ipa Payload
          rm -rf Payload

      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: AltEmby.ipa

  # Create release after both builds finish
  create-release:
    needs: [test-and-build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: ios-ipa
          path: artifacts/

      - name: Rename artifacts
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          cd artifacts
          [ -f app-release.apk ] && mv app-release.apk "AltEmby-${TAG}.apk"
          [ -f AltEmby.ipa ]    && mv AltEmby.ipa      "AltEmby-${TAG}.ipa"
          ls -la

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          gh release create "$TAG" \
            --title "AltEmby $TAG" \
            --generate-notes \
            artifacts/*
