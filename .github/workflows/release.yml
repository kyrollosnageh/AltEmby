name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.1.6)'
        required: true

permissions:
  contents: write

env:
  FLUTTER_VERSION: stable
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"

jobs:
  ensure-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create release if it doesn't exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists"
          else
            gh release create "$TAG" \
              --title "AltEmby $TAG" \
              --generate-notes
            echo "Created release $TAG"
          fi

  build-android:
    needs: ensure-release
    runs-on: ubuntu-latest
    env:
      HAS_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ hashFiles('android/app/build.gradle.kts', 'android/build.gradle.kts', 'android/gradle.properties') }}
          restore-keys: gradle-

      - run: flutter pub get

      - name: Decode keystore
        if: env.HAS_KEYSTORE == 'true'
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks

      - name: Create key.properties
        if: env.HAS_KEYSTORE == 'true'
        run: |
          cat > android/key.properties <<PROPS
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          PROPS

      - run: flutter build apk --release --no-pub

      - name: Upload APK to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          mv build/app/outputs/flutter-apk/app-release.apk "AltEmby-${TAG}.apk"
          gh release upload "$TAG" "AltEmby-${TAG}.apk" --clobber

