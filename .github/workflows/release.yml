name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.1.6)'
        required: true

permissions:
  contents: write

env:
  FLUTTER_VERSION: stable
  # Resolve tag from either trigger type
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  # Run test + Android build in ONE job to avoid re-downloading everything
  test-and-build-android:
    runs-on: ubuntu-latest
    env:
      HAS_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/app/build.gradle.kts', 'android/build.gradle.kts') }}
          restore-keys: gradle-

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

      # Signing setup
      - name: Decode keystore
        if: env.HAS_KEYSTORE == 'true'
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks

      - name: Create key.properties
        if: env.HAS_KEYSTORE == 'true'
        run: |
          cat > android/key.properties <<PROPS
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          PROPS

      - name: Build release APK
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  # iOS runs in parallel with Android (no dependency)
  build-ios:
    runs-on: macos-latest
    env:
      HAS_IOS_CERT: ${{ secrets.IOS_P12_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-macos-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-macos-

      - run: flutter pub get

      - name: Install Apple certificate and provisioning profile
        if: env.HAS_IOS_CERT == 'true'
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 12)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo "${{ secrets.IOS_P12_BASE64 }}" | base64 -d > "$CERT_PATH"
          security import "$CERT_PATH" -P "${{ secrets.IOS_P12_PASSWORD }}" -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

          PROVISION_BASE64="${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}"
          if [ -n "$PROVISION_BASE64" ]; then
            PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
            echo "$PROVISION_BASE64" | base64 -d > "$PROFILE_PATH"
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" \
              /dev/stdin <<< "$(security cms -D -i "$PROFILE_PATH")")
            cp "$PROFILE_PATH" \
              ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID".mobileprovision
          fi

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r AltEmby.ipa Payload
          rm -rf Payload

      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: AltEmby.ipa

  # Create release after both builds finish
  create-release:
    needs: [test-and-build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: ios-ipa
          path: artifacts/

      - name: Rename artifacts
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          cd artifacts
          [ -f app-release.apk ] && mv app-release.apk "AltEmby-${TAG}.apk"
          [ -f AltEmby.ipa ]    && mv AltEmby.ipa      "AltEmby-${TAG}.ipa"
          ls -la

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          gh release create "$TAG" \
            --title "AltEmby $TAG" \
            --generate-notes \
            artifacts/*
